inherits: _base

domain:
  id: real-estate
  name: Real Estate
  description: Property management, listings, transactions, inspections, and market analysis
  tagline: "AI-powered Real Estate Intelligence"
  emoji: "\U0001F3E0"

entity_types:
  - label: Property
    pole_type: OBJECT
    subtype: REAL_PROPERTY
    color: "#b45309"
    icon: home
    properties:
      - name: property_id
        type: string
        required: true
        unique: true
      - name: address
        type: string
        required: true
      - name: property_type
        type: string
        enum: [single_family, condo, townhouse, multi_family, commercial, land, industrial]
      - name: bedrooms
        type: integer
      - name: bathrooms
        type: float
      - name: square_feet
        type: integer
      - name: lot_size_acres
        type: float
      - name: year_built
        type: integer
      - name: tax_assessed_value
        type: float

  - label: Listing
    pole_type: EVENT
    subtype: PROPERTY_LISTING
    color: "#0891b2"
    icon: tag
    properties:
      - name: listing_id
        type: string
        required: true
        unique: true
      - name: list_price
        type: float
        required: true
      - name: list_date
        type: date
        required: true
      - name: status
        type: string
        enum: [active, pending, sold, withdrawn, expired]
      - name: mls_number
        type: string
        unique: true
      - name: days_on_market
        type: integer
      - name: description
        type: string

  - label: Agent
    pole_type: OBJECT
    subtype: REAL_ESTATE_AGENT
    color: "#7c3aed"
    icon: user-check
    properties:
      - name: agent_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: license_number
        type: string
        unique: true
      - name: brokerage
        type: string
      - name: specialization
        type: string
        enum: [residential, commercial, luxury, investment, land, property_management]
      - name: years_experience
        type: integer
      - name: total_sales_volume
        type: float

  - label: Transaction
    pole_type: EVENT
    subtype: REAL_ESTATE_TRANSACTION
    color: "#16a34a"
    icon: handshake
    properties:
      - name: transaction_id
        type: string
        required: true
        unique: true
      - name: sale_price
        type: float
        required: true
      - name: closing_date
        type: date
        required: true
      - name: transaction_type
        type: string
        enum: [purchase, sale, lease, refinance, foreclosure, short_sale]
      - name: financing_type
        type: string
        enum: [conventional, fha, va, cash, jumbo, usda]
      - name: commission_pct
        type: float

  - label: Inspection
    pole_type: EVENT
    subtype: PROPERTY_INSPECTION
    color: "#dc2626"
    icon: clipboard-check
    properties:
      - name: inspection_id
        type: string
        required: true
        unique: true
      - name: inspection_date
        type: date
        required: true
      - name: inspector_name
        type: string
      - name: inspection_type
        type: string
        enum: [general, structural, electrical, plumbing, pest, roof, environmental]
      - name: result
        type: string
        enum: [pass, pass_with_conditions, fail]
      - name: findings
        type: string
      - name: estimated_repair_cost
        type: float

  - label: Neighborhood
    pole_type: OBJECT
    subtype: GEOGRAPHIC_AREA
    color: "#ea580c"
    icon: map-pin
    properties:
      - name: neighborhood_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: city
        type: string
        required: true
      - name: state
        type: string
      - name: zip_code
        type: string
      - name: median_home_price
        type: float
      - name: school_rating
        type: float
      - name: walkability_score
        type: integer

relationships:
  - type: LISTED_BY
    source: Listing
    target: Agent
  - type: LISTING_FOR
    source: Listing
    target: Property
  - type: INSPECTED
    source: Inspection
    target: Property
  - type: SOLD_TO
    source: Transaction
    target: Person
  - type: APPRAISED_AT
    source: Transaction
    target: Property
  - type: LOCATED_IN
    source: Property
    target: Neighborhood
  - type: COMPARABLE_TO
    source: Property
    target: Property
  - type: REPRESENTED_BY
    source: Transaction
    target: Agent

document_templates:
  - id: listing_description
    name: Listing Description
    description: MLS listing descriptions for properties
    count: 12
    prompt_template: |
      Write an MLS listing description for {{property.address}},
      a {{property.property_type}} with {{property.bedrooms}} beds,
      {{property.bathrooms}} baths, {{property.square_feet}} sq ft.
      Built in {{property.year_built}}. Listed at ${{listing.list_price}}
      by {{agent.name}} of {{agent.brokerage}} in {{neighborhood.name}}.
      Include features, neighborhood highlights, and showing instructions.
    required_entities: [Property, Listing, Agent, Neighborhood]

  - id: inspection_report
    name: Inspection Report
    description: Property inspection findings and recommendations
    count: 8
    prompt_template: |
      Write an inspection report for {{property.address}}.
      Inspection type: {{inspection.inspection_type}}.
      Inspector: {{inspection.inspector_name}}. Date: {{inspection.inspection_date}}.
      Result: {{inspection.result}}.
      Include detailed findings, photos referenced, safety concerns,
      and estimated repair costs of ${{inspection.estimated_repair_cost}}.
    required_entities: [Property, Inspection]

  - id: closing_doc
    name: Closing Document
    description: Transaction closing summaries and settlement statements
    count: 6
    prompt_template: |
      Write a closing summary for the {{transaction.transaction_type}} of
      {{property.address}} at ${{transaction.sale_price}}.
      Closing date: {{transaction.closing_date}}.
      Financing: {{transaction.financing_type}}. Agent: {{agent.name}}.
      Include price reconciliation, contingencies met, and key dates.
    required_entities: [Transaction, Property, Agent, Person]

  - id: market_analysis
    name: Market Analysis
    description: Comparative market analysis reports
    count: 8
    prompt_template: |
      Write a comparative market analysis for {{property.address}} in
      {{neighborhood.name}}, {{neighborhood.city}}.
      Median home price: ${{neighborhood.median_home_price}}.
      Include comparable properties, price trends, days on market
      analysis, and recommended pricing strategy.
    required_entities: [Property, Neighborhood, Listing, Transaction]

  - id: client_communication
    name: Client Communication
    description: Agent-to-client emails and updates
    count: 10
    prompt_template: |
      Write a client update email from agent {{agent.name}} to
      {{person.name}} regarding their {{context}} for {{property.address}}.
      Include market update for {{neighborhood.name}}, activity summary,
      and next steps.
    required_entities: [Agent, Person, Property, Neighborhood]

decision_traces:
  - id: pricing_strategy
    task: "Determine optimal listing price for {{property.address}}"
    steps:
      - thought: "Analyze comparable properties in the neighborhood"
        action: "Query recent sales of similar properties in the same area"
      - thought: "Assess current market conditions and trends"
        action: "Review days on market, price reductions, and absorption rate"
      - thought: "Factor in property condition and unique features"
        action: "Review inspection results and compare amenities to comps"
      - thought: "Consider seller's timeline and motivation"
        action: "Balance quick sale vs maximum price strategy"
    outcome_template: "Recommended list price: ${{price}} based on {{rationale}}"

  - id: offer_evaluation
    task: "Evaluate purchase offer of ${{amount}} for {{property.address}}"
    steps:
      - thought: "Compare offer to list price and market value"
        action: "Check list price, comparable sales, and current market conditions"
      - thought: "Assess buyer qualification and financing strength"
        action: "Review financing type, contingencies, and closing timeline"
      - thought: "Consider competing offers and negotiation leverage"
        action: "Check days on market, showing activity, and other interest"
    outcome_template: "Recommendation: {{recommendation}} — {{rationale}}"

  - id: investment_analysis
    task: "Evaluate {{property.address}} as an investment property"
    steps:
      - thought: "Calculate potential rental income and cap rate"
        action: "Query comparable rental rates in the neighborhood"
      - thought: "Assess property condition and capital expenditure needs"
        action: "Review inspection findings and estimated repair costs"
      - thought: "Evaluate neighborhood growth trajectory and appreciation potential"
        action: "Analyze median price trends and development indicators"
    outcome_template: "Investment grade: {{grade}} with projected ROI of {{roi}}"

  - id: property_valuation
    task: "Determine fair market value for {{property.address}} in {{neighborhood.name}}"
    steps:
      - thought: "Pull recent comparable sales within the neighborhood"
        action: "Query transactions for similar property type, size, and bedroom count in the area"
      - thought: "Adjust for property-specific features and condition"
        action: "Review inspection history, year built, lot size, and unique amenities"
      - thought: "Factor in neighborhood trends and market momentum"
        action: "Analyze median home price changes, walkability score, and school ratings"
      - thought: "Cross-reference tax assessed value with market indicators"
        action: "Compare tax_assessed_value to recent sale prices for calibration"
    outcome_template: "Estimated fair market value: ${{value}} (range ${{low}}-${{high}})"

  - id: inspection_assessment
    task: "Assess overall property condition for {{property.address}} based on inspection history"
    steps:
      - thought: "Gather all inspection reports for the property"
        action: "Query inspections linked to property by type and date"
      - thought: "Categorize findings by severity and system"
        action: "Group inspection results by type: structural, electrical, plumbing, pest, roof"
      - thought: "Estimate total repair cost and timeline"
        action: "Sum estimated_repair_cost across all inspections with fail or conditional results"
      - thought: "Determine impact on property value and negotiation leverage"
        action: "Compare repair costs to listing price and comparable property conditions"
    outcome_template: "Condition: {{condition_grade}}. Total estimated repairs: ${{repair_total}}. Negotiation credit recommended: ${{credit}}"

  - id: market_analysis
    task: "Perform comparative market analysis for {{neighborhood.name}}, {{neighborhood.city}}"
    steps:
      - thought: "Analyze current active listings in the neighborhood"
        action: "Query listings with active status for properties in the neighborhood"
      - thought: "Review recent sold transactions and price trends"
        action: "Pull transaction closing prices and dates for the past 12 months"
      - thought: "Calculate absorption rate and inventory levels"
        action: "Compare active listing count to monthly sales velocity"
    outcome_template: "Market type: {{market_type}}. Median price: ${{median}}. Avg days on market: {{dom}}"

  - id: client_matching
    task: "Match buyer {{person.name}} with suitable properties based on their preferences"
    steps:
      - thought: "Identify buyer requirements from transaction history and preferences"
        action: "Review past transactions and property interactions for the buyer"
      - thought: "Search active listings matching criteria"
        action: "Query properties by type, bedroom count, price range, and neighborhood"
      - thought: "Rank matches by neighborhood fit and value proposition"
        action: "Score properties by school rating, walkability, and price relative to comps"
    outcome_template: "Top {{count}} matches identified, best fit: {{property}} at ${{price}}"

  - id: zoning_compliance
    task: "Evaluate zoning and usage compliance for {{property.address}}"
    steps:
      - thought: "Check property type against neighborhood zoning designations"
        action: "Query property type and neighborhood characteristics for the address"
      - thought: "Review comparable properties in the area for precedent"
        action: "Find properties with COMPARABLE_TO relationship and their usage types"
      - thought: "Assess impact on property value if rezoning is needed"
        action: "Compare values of similar properties across different zoning areas"
    outcome_template: "Zoning status: {{status}}. {{recommendation}}"

  - id: offer_negotiation
    task: "Develop negotiation strategy for {{property.address}} listed at ${{listing.list_price}}"
    steps:
      - thought: "Analyze listing history and seller motivation"
        action: "Check days on market, price reductions, and listing status changes"
      - thought: "Review inspection findings for negotiation leverage"
        action: "Pull inspection results and estimated repair costs for the property"
      - thought: "Compare to recent comparable transactions"
        action: "Query nearby sales of similar properties to establish fair value range"
      - thought: "Factor in current market conditions and competing interest"
        action: "Assess neighborhood absorption rate and active listing inventory"
    outcome_template: "Recommended offer: ${{offer}} ({{pct_of_list}}% of list). Strategy: {{strategy}}"

  - id: agent_selection
    task: "Recommend the best agent for {{transaction.transaction_type}} in {{neighborhood.name}}"
    steps:
      - thought: "Identify agents with transaction history in the target neighborhood"
        action: "Query agents linked to transactions for properties in the neighborhood"
      - thought: "Compare performance metrics across candidates"
        action: "Rank agents by total sales volume, transaction count, and average sale price"
      - thought: "Evaluate specialization match and experience level"
        action: "Filter agents by specialization matching the transaction type and years of experience"
    outcome_template: "Recommended agent: {{agent}} — {{transactions}} transactions, ${{volume}} volume in area"

demo_scenarios:
  - name: Property Search
    prompts:
      - "Find all active listings in the Downtown neighborhood under $500,000"
      - "Show me 3-bedroom homes with good school ratings nearby"
      - "What are the comparable properties to 123 Main Street?"

  - name: Market Intelligence
    prompts:
      - "What is the median price trend in Riverside over the past year?"
      - "Which neighborhoods have the shortest days on market?"
      - "Compare sold prices to list prices across all neighborhoods"

  - name: Agent & Transactions
    prompts:
      - "Show me the top performing agents by sales volume this year"
      - "What is the average commission rate for luxury properties?"
      - "Find all transactions with FHA financing in the last 6 months"

agent_tools:
  - name: search_property
    description: Search for properties by address, type, or neighborhood
    cypher: |
      MATCH (p:Property)
      WHERE toLower(p.address) CONTAINS toLower($query)
         OR toLower(coalesce(p.property_type, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (p)-[:LOCATED_IN]->(n:Neighborhood)
      OPTIONAL MATCH (l:Listing)-[:LISTING_FOR]->(p)
      RETURN p, n.name AS neighborhood, l.list_price, l.status AS listing_status
      ORDER BY l.list_price DESC
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Property address or type to search for

  - name: comparable_analysis
    description: Find comparable properties for market analysis
    cypher: |
      MATCH (p:Property {property_id: $property_id})-[:LOCATED_IN]->(n:Neighborhood)
      MATCH (comp:Property)-[:LOCATED_IN]->(n)
      WHERE comp.property_id <> $property_id
        AND comp.property_type = p.property_type
        AND abs(comp.square_feet - p.square_feet) < 500
        AND abs(comp.bedrooms - p.bedrooms) <= 1
      OPTIONAL MATCH (t:Transaction)-[:APPRAISED_AT]->(comp)
      RETURN comp.address, comp.bedrooms, comp.bathrooms,
             comp.square_feet, comp.year_built,
             t.sale_price, t.closing_date
      ORDER BY t.closing_date DESC
      LIMIT 10
    parameters:
      - name: property_id
        type: string
        description: Property ID to find comparables for

  - name: market_trends
    description: Analyze market trends for a neighborhood or city
    cypher: |
      MATCH (n:Neighborhood)
      WHERE toLower(n.name) CONTAINS toLower($query)
         OR toLower(n.city) CONTAINS toLower($query)
      OPTIONAL MATCH (p:Property)-[:LOCATED_IN]->(n)
      OPTIONAL MATCH (l:Listing)-[:LISTING_FOR]->(p)
      OPTIONAL MATCH (t:Transaction)-[:APPRAISED_AT]->(p)
      RETURN n.name AS neighborhood, n.city,
             n.median_home_price, n.school_rating, n.walkability_score,
             count(DISTINCT l) AS total_listings,
             count(DISTINCT t) AS total_transactions,
             avg(t.sale_price) AS avg_sale_price,
             avg(l.days_on_market) AS avg_days_on_market
    parameters:
      - name: query
        type: string
        description: Neighborhood or city name to analyze

  - name: agent_performance
    description: Analyze agent sales performance and activity
    cypher: |
      MATCH (a:Agent)
      WHERE toLower(a.name) CONTAINS toLower($query)
         OR toLower(coalesce(a.brokerage, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (l:Listing)-[:LISTED_BY]->(a)
      OPTIONAL MATCH (t:Transaction)-[:REPRESENTED_BY]->(a)
      RETURN a.name AS agent, a.brokerage, a.specialization,
             a.years_experience, a.total_sales_volume,
             count(DISTINCT l) AS listings,
             count(DISTINCT t) AS transactions,
             avg(t.sale_price) AS avg_sale_price
      ORDER BY a.total_sales_volume DESC
    parameters:
      - name: query
        type: string
        description: Agent name or brokerage to search for

  - name: inspection_history
    description: Get inspection history for a property
    cypher: |
      MATCH (i:Inspection)-[:INSPECTED]->(p:Property)
      WHERE p.property_id = $property_id
         OR toLower(p.address) CONTAINS toLower($property_id)
      RETURN p.address, i.inspection_type, i.inspection_date,
             i.result, i.inspector_name, i.findings,
             i.estimated_repair_cost
      ORDER BY i.inspection_date DESC
    parameters:
      - name: property_id
        type: string
        description: Property ID or address to look up inspections for

  - name: list_properties
    description: "List Property records with optional limit"
    cypher: |
      MATCH (n:Property)
      RETURN n
      ORDER BY n.address
      LIMIT toInteger($limit)
    parameters:
      - name: limit
        type: string
        description: "Maximum number of results to return (default: 10)"

  - name: get_property_by_id
    description: "Get a specific Property by ID with all connections"
    cypher: |
      MATCH (n:Property {property_id: $id})
      OPTIONAL MATCH (n)-[r]-(related)
      RETURN n, type(r) AS relationship, labels(related) AS related_labels, related.name AS related_name
      LIMIT 50
    parameters:
      - name: id
        type: string
        description: "The property_id to look up"

system_prompt: |
  You are an AI real estate intelligence assistant with access to a comprehensive
  knowledge graph of properties, listings, transactions, and market data. You
  help real estate agents, buyers, sellers, and investors make informed
  decisions about property transactions and investments.

  Your capabilities include:
  - Searching properties by location, type, and features
  - Performing comparative market analysis with comparable properties
  - Analyzing neighborhood market trends and pricing dynamics
  - Tracking agent performance and transaction history
  - Reviewing inspection reports and property condition assessments

  Always provide accurate, data-driven responses. When making pricing or
  investment recommendations, cite specific comparable sales, market statistics,
  and property data from the knowledge graph.

visualization:
  node_colors:
    Person: "#22c55e"
    Organization: "#3b82f6"
    Property: "#b45309"
    Listing: "#0891b2"
    Agent: "#7c3aed"
    Transaction: "#16a34a"
    Inspection: "#dc2626"
    Neighborhood: "#ea580c"
  node_sizes:
    Person: 20
    Organization: 25
    Property: 25
    Listing: 20
    Agent: 25
    Transaction: 20
    Inspection: 15
    Neighborhood: 30
  default_cypher: "MATCH (p:Property)-[:LOCATED_IN]->(n:Neighborhood) OPTIONAL MATCH (l:Listing)-[:LISTING_FOR]->(p) RETURN p, n, l LIMIT 100"
