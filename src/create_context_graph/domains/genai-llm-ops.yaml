inherits: _base

domain:
  id: genai-llm-ops
  name: GenAI & LLM Ops
  description: Machine learning model lifecycle, experiment tracking, prompt engineering, and deployment management
  tagline: "AI-powered ML Operations Intelligence"
  emoji: "\U0001F916"

entity_types:
  - label: Model
    pole_type: OBJECT
    subtype: ML_MODEL
    color: "#7c3aed"
    icon: cpu
    properties:
      - name: model_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: architecture
        type: string
        enum: [transformer, diffusion, cnn, rnn, moe, rl_agent]
      - name: parameter_count
        type: float
      - name: version
        type: string
      - name: status
        type: string
        enum: [training, evaluating, staging, production, deprecated]

  - label: Experiment
    pole_type: EVENT
    subtype: ML_EXPERIMENT
    color: "#d946ef"
    icon: flask-conical
    properties:
      - name: experiment_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: hypothesis
        type: string
      - name: started_at
        type: datetime
        required: true
      - name: completed_at
        type: datetime
      - name: status
        type: string
        enum: [running, completed, failed, cancelled]

  - label: Dataset
    pole_type: OBJECT
    subtype: DATA_ASSET
    color: "#06b6d4"
    icon: database
    properties:
      - name: dataset_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: size_gb
        type: float
      - name: record_count
        type: integer
      - name: format
        type: string
        enum: [parquet, jsonl, csv, tfrecord, arrow]
      - name: domain
        type: string

  - label: Prompt
    pole_type: OBJECT
    subtype: PROMPT_TEMPLATE
    color: "#ec4899"
    icon: message-square
    properties:
      - name: prompt_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: template
        type: string
      - name: version
        type: string
      - name: category
        type: string
        enum: [system, user, few_shot, chain_of_thought, tool_use]

  - label: Evaluation
    pole_type: EVENT
    subtype: MODEL_EVALUATION
    color: "#10b981"
    icon: bar-chart-2
    properties:
      - name: eval_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: metric
        type: string
        enum: [accuracy, f1, bleu, rouge, perplexity, human_preference]
      - name: score
        type: float
      - name: date
        type: datetime
        required: true

  - label: Deployment
    pole_type: EVENT
    subtype: MODEL_DEPLOYMENT
    color: "#0891b2"
    icon: rocket
    properties:
      - name: deployment_id
        type: string
        required: true
        unique: true
      - name: environment
        type: string
        required: true
        enum: [development, staging, canary, production]
      - name: endpoint_url
        type: string
      - name: deployed_at
        type: datetime
        required: true
      - name: status
        type: string
        enum: [active, draining, rolled_back, terminated]

relationships:
  - type: FINE_TUNED_FROM
    source: Model
    target: Model
  - type: EVALUATED_ON
    source: Model
    target: Dataset
  - type: DEPLOYED_TO
    source: Model
    target: Deployment
  - type: USED_PROMPT
    source: Experiment
    target: Prompt
  - type: TRAINED_ON
    source: Model
    target: Dataset
  - type: COMPARED_WITH
    source: Evaluation
    target: Evaluation
  - type: PRODUCED_BY
    source: Model
    target: Experiment
  - type: SCORED_IN
    source: Model
    target: Evaluation

document_templates:
  - id: experiment_log
    name: Experiment Log
    description: Detailed log of ML experiment runs and observations
    count: 10
    prompt_template: |
      Write an experiment log entry for experiment "{{experiment.name}}"
      testing model {{model.name}} on dataset {{dataset.name}}.
      Hypothesis: {{experiment.hypothesis}}.
      Started: {{experiment.started_at}}. Include observations, metrics, and next steps.
    required_entities: [Model, Experiment, Dataset]

  - id: eval_report
    name: Evaluation Report
    description: Comprehensive model evaluation and benchmark results
    count: 8
    prompt_template: |
      Write an evaluation report for model {{model.name}} (v{{model.version}})
      evaluated on {{dataset.name}} using {{evaluation.metric}}.
      Score: {{evaluation.score}}. Compare against baseline and previous versions.
    required_entities: [Model, Evaluation, Dataset]

  - id: deployment_runbook
    name: Deployment Runbook
    description: Step-by-step deployment procedures and rollback plans
    count: 6
    prompt_template: |
      Write a deployment runbook for deploying model {{model.name}}
      to {{deployment.environment}} at {{deployment.endpoint_url}}.
      Include pre-deployment checks, deployment steps, monitoring, and rollback procedures.
    required_entities: [Model, Deployment]

  - id: model_card
    name: Model Card
    description: Documentation of model capabilities, limitations, and intended use
    count: 6
    prompt_template: |
      Write a model card for {{model.name}} ({{model.architecture}},
      {{model.parameter_count}} parameters). Include intended use, training data
      ({{dataset.name}}), evaluation results, limitations, and ethical considerations.
    required_entities: [Model, Dataset, Evaluation]

  - id: prompt_engineering_notes
    name: Prompt Engineering Notes
    description: Notes on prompt design, iteration, and performance
    count: 8
    prompt_template: |
      Write prompt engineering notes for prompt "{{prompt.name}}"
      (category: {{prompt.category}}) used in experiment {{experiment.name}}
      with model {{model.name}}. Document design rationale, iterations tried,
      and observed impact on output quality.
    required_entities: [Prompt, Experiment, Model]

decision_traces:
  - id: model_promotion
    task: "Decide whether to promote model {{model.name}} from staging to production"
    steps:
      - thought: "Review evaluation metrics across all benchmarks"
        action: "Query all evaluations for this model and compare against production baseline"
      - thought: "Check for regression on critical safety and fairness metrics"
        action: "Compare safety evaluation scores with minimum thresholds"
      - thought: "Assess infrastructure readiness and cost implications"
        action: "Review deployment resource requirements and latency benchmarks"
      - thought: "Evaluate rollback plan and monitoring coverage"
        action: "Verify rollback procedures and alerting are in place"
    outcome_template: "Decision: {{decision}} promotion based on {{rationale}}"

  - id: experiment_direction
    task: "Determine next experiment direction after {{experiment.name}} results"
    steps:
      - thought: "Analyze which hyperparameters had the most impact"
        action: "Query experiment results and correlate with configuration changes"
      - thought: "Identify gaps in current evaluation coverage"
        action: "Review which benchmarks and datasets have not been tested"
      - thought: "Compare with state-of-the-art approaches"
        action: "Search for similar experiments and their outcomes"
    outcome_template: "Next experiment: {{plan}} targeting {{metric}} improvement"

  - id: prompt_optimization
    task: "Optimize prompt {{prompt.name}} for improved {{metric}} on {{model.name}}"
    steps:
      - thought: "Analyze current prompt failure modes"
        action: "Query evaluation results filtered by error categories"
      - thought: "Review successful prompt patterns from similar tasks"
        action: "Search prompt library for high-performing templates in same category"
      - thought: "Design A/B test for prompt variants"
        action: "Create experiment comparing top prompt candidates"
    outcome_template: "Optimized prompt: {{result}} with {{improvement}}% gain"

demo_scenarios:
  - name: Model Lifecycle
    prompts:
      - "Show me all models currently in production and their evaluation scores"
      - "What experiments led to the latest version of our summarization model?"
      - "Compare the performance of GPT-4 fine-tune vs our custom model on the QA benchmark"

  - name: Experiment Tracking
    prompts:
      - "What experiments have been run this month and what were the outcomes?"
      - "Show me the training data lineage for model llm-v3.2"
      - "Which prompts performed best in the customer support evaluation?"

  - name: Deployment Operations
    prompts:
      - "What is the deployment history for our production endpoint?"
      - "Show me all models that were rolled back in the last 30 days"
      - "What evaluations were run before the latest production deployment?"

agent_tools:
  - name: search_model
    description: Search for ML models by name, architecture, or status
    cypher: |
      MATCH (m:Model)
      WHERE toLower(m.name) CONTAINS toLower($query)
         OR toLower(coalesce(m.architecture, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (m)-[r]-(related)
      RETURN m, type(r) AS rel_type, related
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Model name, architecture, or keyword to search for

  - name: experiment_comparison
    description: Compare results across multiple experiments for a model
    cypher: |
      MATCH (m:Model {name: $model_name})<-[:PRODUCED_BY]-(e:Experiment)
      OPTIONAL MATCH (m)-[:SCORED_IN]->(ev:Evaluation)
      OPTIONAL MATCH (e)-[:USED_PROMPT]->(p:Prompt)
      RETURN e, ev, p
      ORDER BY e.started_at DESC
      LIMIT 20
    parameters:
      - name: model_name
        type: string
        description: Name of the model to compare experiments for

  - name: eval_metrics
    description: Get evaluation metrics and scores for a specific model version
    cypher: |
      MATCH (m:Model {name: $model_name})-[:SCORED_IN]->(ev:Evaluation)
      OPTIONAL MATCH (m)-[:EVALUATED_ON]->(d:Dataset)
      RETURN m, ev, d
      ORDER BY ev.date DESC
      LIMIT 20
    parameters:
      - name: model_name
        type: string
        description: Name of the model to get evaluation metrics for

  - name: deployment_history
    description: View deployment history and status for models
    cypher: |
      MATCH (m:Model)-[:DEPLOYED_TO]->(dep:Deployment)
      WHERE m.name = $model_name OR $model_name = ''
      RETURN m.name, dep.deployment_id, dep.environment, dep.deployed_at, dep.status
      ORDER BY dep.deployed_at DESC
      LIMIT 20
    parameters:
      - name: model_name
        type: string
        description: Model name to filter deployments (empty for all)

  - name: prompt_analysis
    description: Analyze prompt performance across experiments
    cypher: |
      MATCH (p:Prompt)<-[:USED_PROMPT]-(e:Experiment)
      WHERE toLower(p.name) CONTAINS toLower($query)
         OR toLower(coalesce(p.category, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (e)<-[:PRODUCED_BY]-(m:Model)-[:SCORED_IN]->(ev:Evaluation)
      RETURN p, e, m, ev
      ORDER BY ev.score DESC
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Prompt name or category to search for

system_prompt: |
  You are an AI assistant for ML operations and LLM lifecycle management. You have
  access to a comprehensive knowledge graph tracking models, experiments, datasets,
  prompts, evaluations, and deployments.

  Your capabilities include:
  - Tracking model lineage and fine-tuning history
  - Comparing experiment results and evaluation metrics
  - Analyzing prompt engineering patterns and performance
  - Reviewing deployment history and production readiness
  - Identifying trends and regressions across model versions

  Always provide data-driven insights. When recommending actions, reference specific
  evaluation scores, experiment outcomes, and deployment metrics from the knowledge graph.

visualization:
  node_colors:
    Model: "#7c3aed"
    Experiment: "#d946ef"
    Dataset: "#06b6d4"
    Prompt: "#ec4899"
    Evaluation: "#10b981"
    Deployment: "#0891b2"
    Person: "#22c55e"
    Organization: "#64748b"
  node_sizes:
    Model: 30
    Experiment: 25
    Dataset: 20
    Prompt: 20
    Evaluation: 20
    Deployment: 25
  default_cypher: "MATCH (m:Model)-[r]-(n) RETURN m, r, n LIMIT 100"
