inherits: _base

domain:
  id: oil-gas
  name: Oil & Gas
  description: Upstream operations, drilling, production monitoring, and regulatory compliance
  tagline: "AI-powered Energy Intelligence"
  emoji: "\U0001F6E2\uFE0F"

entity_types:
  - label: Well
    pole_type: OBJECT
    subtype: DRILLING_WELL
    color: "#78350f"
    icon: drill
    properties:
      - name: well_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: well_type
        type: string
        enum: [exploration, development, injection, disposal, observation]
      - name: status
        type: string
        enum: [drilling, producing, shut_in, plugged_abandoned, suspended, completed]
      - name: spud_date
        type: date
      - name: total_depth_ft
        type: float
      - name: latitude
        type: float
      - name: longitude
        type: float
      - name: daily_production_bbl
        type: float

  - label: Reservoir
    pole_type: OBJECT
    subtype: GEOLOGICAL_UNIT
    color: "#0369a1"
    icon: layers
    properties:
      - name: reservoir_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: reservoir_type
        type: string
        enum: [conventional, tight, shale, carbonate, sandstone, coalbed_methane]
      - name: depth_ft
        type: float
      - name: pressure_psi
        type: float
      - name: temperature_f
        type: float
      - name: porosity_pct
        type: float
      - name: estimated_reserves_mmbbl
        type: float

  - label: Equipment
    pole_type: OBJECT
    subtype: FIELD_EQUIPMENT
    color: "#475569"
    icon: wrench
    properties:
      - name: equipment_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: equipment_type
        type: string
        enum: [pump_jack, compressor, separator, pipeline, tank, bop, rig, meter]
      - name: manufacturer
        type: string
      - name: install_date
        type: date
      - name: last_service_date
        type: date
      - name: condition
        type: string
        enum: [new, good, fair, poor, critical]
      - name: operating_hours
        type: integer

  - label: Inspection
    pole_type: EVENT
    subtype: SAFETY_INSPECTION
    color: "#dc2626"
    icon: clipboard-check
    properties:
      - name: inspection_id
        type: string
        required: true
        unique: true
      - name: inspection_date
        type: date
        required: true
      - name: inspector
        type: string
      - name: inspection_type
        type: string
        enum: [safety, environmental, mechanical, regulatory, pressure_test, corrosion]
      - name: result
        type: string
        enum: [pass, conditional_pass, fail, critical_failure]
      - name: findings
        type: string
      - name: corrective_actions
        type: string

  - label: Permit
    pole_type: OBJECT
    subtype: REGULATORY_PERMIT
    color: "#7c3aed"
    icon: file-badge
    properties:
      - name: permit_id
        type: string
        required: true
        unique: true
      - name: permit_type
        type: string
        enum: [drilling, completion, workover, disposal, pipeline, environmental, production]
      - name: issuing_authority
        type: string
        required: true
      - name: issue_date
        type: date
      - name: expiry_date
        type: date
      - name: status
        type: string
        enum: [applied, under_review, approved, active, expired, revoked]
      - name: conditions
        type: string

  - label: Formation
    pole_type: OBJECT
    subtype: GEOLOGICAL_FORMATION
    color: "#a16207"
    icon: mountain
    properties:
      - name: formation_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: geological_age
        type: string
        enum: [quaternary, neogene, paleogene, cretaceous, jurassic, triassic, permian, carboniferous, devonian]
      - name: lithology
        type: string
        enum: [sandstone, limestone, shale, dolomite, siltstone, conglomerate]
      - name: thickness_ft
        type: float
      - name: top_depth_ft
        type: float
      - name: hydrocarbon_bearing
        type: boolean

relationships:
  - type: DRILLED_IN
    source: Well
    target: Formation
  - type: INSPECTED_BY
    source: Inspection
    target: Well
  - type: PERMITTED_FOR
    source: Permit
    target: Well
  - type: PRODUCES_FROM
    source: Well
    target: Reservoir
  - type: CONNECTED_TO
    source: Equipment
    target: Well
  - type: MAINTAINED_BY
    source: Equipment
    target: Person
  - type: CONTAINS
    source: Formation
    target: Reservoir
  - type: INSPECTED_EQUIPMENT
    source: Inspection
    target: Equipment

document_templates:
  - id: drilling_report
    name: Drilling Report
    description: Daily drilling operations reports
    count: 12
    prompt_template: |
      Write a daily drilling report for well {{well.name}} ({{well.well_id}}).
      Status: {{well.status}}. Current depth: {{well.total_depth_ft}} ft.
      Formation: {{formation.name}} ({{formation.lithology}}).
      Include drilling parameters, mud properties, bit performance,
      formation characteristics, and safety observations.
    required_entities: [Well, Formation, Equipment]

  - id: safety_inspection
    name: Safety Inspection Report
    description: Field safety and environmental inspection reports
    count: 10
    prompt_template: |
      Write a safety inspection report for well {{well.name}}.
      Inspector: {{inspection.inspector}}. Type: {{inspection.inspection_type}}.
      Result: {{inspection.result}}. Date: {{inspection.inspection_date}}.
      Include detailed findings, regulatory compliance status,
      corrective actions required, and follow-up schedule.
    required_entities: [Well, Inspection, Equipment, Permit]

  - id: regulatory_filing
    name: Regulatory Filing
    description: Regulatory submissions and compliance documents
    count: 6
    prompt_template: |
      Write a regulatory filing for permit {{permit.permit_id}}
      ({{permit.permit_type}}) for well {{well.name}}.
      Issuing authority: {{permit.issuing_authority}}.
      Include operational summary, compliance metrics,
      environmental monitoring data, and permit condition status.
    required_entities: [Permit, Well, Inspection]

  - id: production_log
    name: Production Log
    description: Well production performance logs and analyses
    count: 10
    prompt_template: |
      Write a production log for well {{well.name}} producing from
      reservoir {{reservoir.name}} ({{reservoir.reservoir_type}}).
      Daily production: {{well.daily_production_bbl}} bbl.
      Include production rates, pressure readings, water cut analysis,
      decline curve assessment, and optimization recommendations.
    required_entities: [Well, Reservoir, Equipment]

  - id: equipment_maintenance
    name: Equipment Maintenance Report
    description: Equipment maintenance and service reports
    count: 8
    prompt_template: |
      Write a maintenance report for {{equipment.name}} ({{equipment.equipment_id}})
      at well {{well.name}}. Equipment type: {{equipment.equipment_type}}.
      Condition: {{equipment.condition}}. Operating hours: {{equipment.operating_hours}}.
      Technician: {{person.name}}. Include work performed, parts replaced,
      test results, and next service recommendation.
    required_entities: [Equipment, Well, Person]

decision_traces:
  - id: drilling_decision
    task: "Evaluate whether to drill a new well in {{formation.name}} formation at proposed location"
    steps:
      - thought: "Assess geological data and reservoir characteristics"
        action: "Query formation properties, nearby well results, and reservoir estimates"
      - thought: "Review permit requirements and regulatory constraints"
        action: "Check permit status and environmental restrictions for the area"
      - thought: "Evaluate economic viability based on estimated reserves"
        action: "Calculate projected production, costs, and breakeven price"
      - thought: "Assess operational risks and mitigation options"
        action: "Review inspection history and equipment availability for similar wells"
    outcome_template: "Decision: {{decision}} — estimated EUR {{reserves}} MMbbl at {{breakeven}} breakeven"

  - id: well_intervention
    task: "Determine if well {{well.name}} requires workover or stimulation"
    steps:
      - thought: "Analyze production decline and compare to type curve"
        action: "Query production history and calculate decline rate"
      - thought: "Review well condition and recent inspection findings"
        action: "Check inspection reports and equipment condition assessments"
      - thought: "Evaluate intervention options and expected uplift"
        action: "Compare costs and production gains for workover vs stimulation vs status quo"
    outcome_template: "Recommendation: {{action}} with expected uplift of {{uplift}} bbl/day"

  - id: equipment_replacement
    task: "Assess whether to repair or replace {{equipment.name}} at well {{well.name}}"
    steps:
      - thought: "Review equipment condition history and failure patterns"
        action: "Query inspection records and maintenance history"
      - thought: "Compare repair cost vs replacement cost and downtime impact"
        action: "Estimate repair costs, replacement costs, and production loss"
      - thought: "Consider remaining useful life and technology upgrades"
        action: "Evaluate newer equipment options and efficiency improvements"
    outcome_template: "Decision: {{decision}} — {{rationale}} with net cost of ${{cost}}"

  - id: regulatory_compliance_check
    task: "Assess regulatory compliance status for well {{well.name}} ahead of upcoming inspection"
    steps:
      - thought: "Review all active permits and their condition requirements"
        action: "Query permits linked to this well and check status and conditions"
      - thought: "Verify that corrective actions from prior inspections are complete"
        action: "Search inspection history for outstanding corrective actions"
      - thought: "Check equipment certifications and testing schedules"
        action: "Review equipment inspection records and identify overdue pressure tests or certifications"
      - thought: "Prepare compliance documentation"
        action: "Compile permit conditions, inspection results, and equipment records into compliance summary"
    outcome_template: "Compliance status: {{status}}. Outstanding items: {{items}}. Risk: {{risk}}"

  - id: production_optimization
    task: "Optimize production strategy for well {{well.name}} producing from reservoir {{reservoir.name}}"
    steps:
      - thought: "Analyze current production rate and decline curve"
        action: "Query production history and calculate decline rate and EUR"
      - thought: "Evaluate reservoir pressure and water cut trends"
        action: "Review reservoir pressure data and water production ratios over time"
      - thought: "Assess artificial lift optimization or stimulation potential"
        action: "Check equipment status and compare production against offset wells"
      - thought: "Model economic impact of proposed changes"
        action: "Calculate incremental production and net revenue for each optimization option"
    outcome_template: "Optimization: {{action}} with projected uplift of {{uplift}} bbl/day and ROI of {{roi}}%"

  - id: environmental_risk_assessment
    task: "Assess environmental risk for operations at well {{well.name}}"
    steps:
      - thought: "Review environmental inspection history and findings"
        action: "Query inspections of type environmental for this well and nearby wells"
      - thought: "Check for proximity to sensitive environmental features"
        action: "Assess well location relative to waterways, habitats, and populated areas"
      - thought: "Evaluate spill prevention and containment measures"
        action: "Review equipment condition for containment integrity and leak detection"
      - thought: "Assess regulatory exposure and potential liabilities"
        action: "Check environmental permit conditions and violation history"
    outcome_template: "Risk level: {{risk}}. Key concerns: {{concerns}}. Mitigation: {{mitigation}}"

  - id: well_spacing_analysis
    task: "Determine optimal spacing for new development wells in {{formation.name}} formation"
    steps:
      - thought: "Analyze production performance of existing wells by spacing"
        action: "Query wells in this formation and correlate spacing with production rates"
      - thought: "Evaluate reservoir characteristics affecting drainage area"
        action: "Review porosity, permeability, and pressure data for the formation"
      - thought: "Identify interference patterns between closely spaced wells"
        action: "Compare production decline rates for closely vs widely spaced wells"
      - thought: "Model economic returns at different spacing scenarios"
        action: "Calculate NPV for each spacing option considering well cost and production"
    outcome_template: "Optimal spacing: {{spacing}} ft. Expected EUR per well: {{eur}} Mbbl. NPV improvement: {{npv}}%"

  - id: plug_and_abandon_decision
    task: "Evaluate whether to plug and abandon well {{well.name}}"
    steps:
      - thought: "Assess remaining economic production potential"
        action: "Calculate current production rate and projected remaining reserves"
      - thought: "Estimate plug and abandonment costs and timing"
        action: "Review well depth, casing configuration, and regulatory requirements for P&A"
      - thought: "Evaluate environmental obligations and liability timeline"
        action: "Check environmental permit obligations and bonding requirements"
      - thought: "Consider alternative uses such as injection or observation"
        action: "Assess suitability for conversion to disposal well or observation well"
    outcome_template: "Decision: {{decision}}. P&A cost estimate: ${{cost}}. Timeline: {{timeline}}"

  - id: formation_evaluation
    task: "Evaluate hydrocarbon potential of {{formation.name}} formation for exploration well planning"
    steps:
      - thought: "Review geological characteristics and regional data"
        action: "Query formation properties including lithology, thickness, and depth"
      - thought: "Analyze nearby well results in the same formation"
        action: "Search wells drilled in this formation and their production outcomes"
      - thought: "Assess reservoir quality indicators"
        action: "Review porosity, permeability, and hydrocarbon-bearing indicators"
      - thought: "Estimate risk-weighted resource potential"
        action: "Calculate estimated reserves using volumetric method and apply geologic risk factors"
    outcome_template: "Evaluation: {{rating}}. Estimated resources: {{resources}} MMbbl. Geological risk: {{risk}}"

demo_scenarios:
  - name: Production Operations
    prompts:
      - "Show me all producing wells sorted by daily production rate"
      - "Which wells have shown production decline greater than 15% this quarter?"
      - "What is the total estimated reserves across all active reservoirs?"

  - name: Safety & Compliance
    prompts:
      - "Are there any wells with failed safety inspections in the last 90 days?"
      - "Show me all permits expiring within the next 6 months"
      - "Which wells have overdue corrective actions from inspections?"

  - name: Equipment & Maintenance
    prompts:
      - "List all equipment in poor or critical condition"
      - "What is the maintenance history for pump jack PJ-1042?"
      - "Which wells have equipment that exceeds 10,000 operating hours?"

agent_tools:
  - name: search_well
    description: Search for wells by name, type, or status
    cypher: |
      MATCH (w:Well)
      WHERE toLower(w.name) CONTAINS toLower($query)
         OR toLower(coalesce(w.well_type, '')) CONTAINS toLower($query)
         OR toLower(coalesce(w.status, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (w)-[:PRODUCES_FROM]->(r:Reservoir)
      OPTIONAL MATCH (w)-[:DRILLED_IN]->(f:Formation)
      RETURN w, r.name AS reservoir, f.name AS formation
      ORDER BY w.daily_production_bbl DESC
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Well name, type, or status to search for

  - name: production_data
    description: Get production data and performance metrics for wells
    cypher: |
      MATCH (w:Well)
      WHERE w.status = 'producing'
        AND (toLower(w.name) CONTAINS toLower($query) OR $query = 'all')
      OPTIONAL MATCH (w)-[:PRODUCES_FROM]->(r:Reservoir)
      RETURN w.name AS well, w.well_type, w.daily_production_bbl,
             w.total_depth_ft, r.name AS reservoir,
             r.estimated_reserves_mmbbl, r.pressure_psi
      ORDER BY w.daily_production_bbl DESC
      LIMIT 50
    parameters:
      - name: query
        type: string
        description: Well name or 'all' for all producing wells

  - name: inspection_history
    description: Get inspection history for a well or equipment
    cypher: |
      MATCH (i:Inspection)
      OPTIONAL MATCH (i)-[:INSPECTED_BY]->(w:Well)
      OPTIONAL MATCH (i)-[:INSPECTED_EQUIPMENT]->(e:Equipment)
      WHERE toLower(coalesce(w.name, '')) CONTAINS toLower($query)
         OR toLower(coalesce(e.name, '')) CONTAINS toLower($query)
      RETURN w.name AS well, e.name AS equipment,
             i.inspection_type, i.inspection_date, i.result,
             i.findings, i.corrective_actions
      ORDER BY i.inspection_date DESC
      LIMIT 30
    parameters:
      - name: query
        type: string
        description: Well name or equipment name to look up inspections for

  - name: permit_status
    description: Check permit status and expiration for wells
    cypher: |
      MATCH (p:Permit)-[:PERMITTED_FOR]->(w:Well)
      WHERE toLower(w.name) CONTAINS toLower($query)
         OR toLower(coalesce(p.permit_type, '')) CONTAINS toLower($query)
         OR p.status = $query
      RETURN w.name AS well, p.permit_id, p.permit_type,
             p.issuing_authority, p.status,
             p.issue_date, p.expiry_date, p.conditions
      ORDER BY p.expiry_date ASC
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Well name, permit type, or status to search for

  - name: equipment_health
    description: Assess equipment condition and maintenance needs
    cypher: |
      MATCH (e:Equipment)-[:CONNECTED_TO]->(w:Well)
      WHERE toLower(w.name) CONTAINS toLower($query)
         OR toLower(e.name) CONTAINS toLower($query)
         OR toLower(coalesce(e.condition, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (i:Inspection)-[:INSPECTED_EQUIPMENT]->(e)
      RETURN e.name AS equipment, e.equipment_type, e.condition,
             e.operating_hours, e.last_service_date,
             w.name AS well,
             count(i) AS inspection_count,
             max(i.inspection_date) AS last_inspection
      ORDER BY CASE e.condition
        WHEN 'critical' THEN 1
        WHEN 'poor' THEN 2
        WHEN 'fair' THEN 3
        ELSE 4 END
    parameters:
      - name: query
        type: string
        description: Well name, equipment name, or condition to search for

  - name: list_wells
    description: "List well records with optional limit"
    cypher: |
      MATCH (n:Well)
      RETURN n
      ORDER BY n.name
      LIMIT toInteger($limit)
    parameters:
      - name: limit
        type: string
        description: "Maximum number of results to return (default: 10)"

  - name: get_well_by_id
    description: "Get a specific well by ID with all connections"
    cypher: |
      MATCH (n:Well {well_id: $id})
      OPTIONAL MATCH (n)-[r]-(related)
      RETURN n, type(r) AS relationship, labels(related) AS related_labels, related.name AS related_name
      LIMIT 50
    parameters:
      - name: id
        type: string
        description: "The well_id to look up"

system_prompt: |
  You are an AI energy intelligence assistant with access to a comprehensive
  knowledge graph of oil and gas operations data. You help petroleum engineers,
  field operators, and regulatory compliance managers monitor production,
  maintain equipment, ensure safety compliance, and optimize operations.

  Your capabilities include:
  - Searching and analyzing well performance and production data
  - Monitoring equipment condition and maintenance schedules
  - Tracking inspection results and corrective actions
  - Managing permit status and regulatory compliance
  - Analyzing reservoir characteristics and formation geology

  Always provide accurate, data-driven responses. When making operational
  recommendations, cite specific production data, inspection findings, and
  equipment metrics from the knowledge graph. Safety is always the top priority.

visualization:
  node_colors:
    Person: "#22c55e"
    Organization: "#3b82f6"
    Well: "#78350f"
    Reservoir: "#0369a1"
    Equipment: "#475569"
    Inspection: "#dc2626"
    Permit: "#7c3aed"
    Formation: "#a16207"
  node_sizes:
    Person: 20
    Organization: 25
    Well: 30
    Reservoir: 25
    Equipment: 20
    Inspection: 15
    Permit: 20
    Formation: 25
  default_cypher: "MATCH (w:Well)-[r]-(n) RETURN w, r, n LIMIT 100"
