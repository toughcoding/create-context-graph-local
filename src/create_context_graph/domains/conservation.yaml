inherits: _base

domain:
  id: conservation
  name: Conservation
  description: Wildlife conservation, habitat protection, species monitoring, and environmental stewardship
  tagline: "AI-powered Conservation Intelligence"
  emoji: "\U0001F33F"

entity_types:
  - label: Site
    pole_type: OBJECT
    subtype: CONSERVATION_SITE
    color: "#16a34a"
    icon: map-pin
    properties:
      - name: site_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: site_type
        type: string
        enum: [national_park, wildlife_refuge, marine_reserve, forest_reserve, wetland, corridor]
      - name: area_hectares
        type: float
      - name: country
        type: string
      - name: protection_level
        type: string
        enum: [strict, managed, sustainable_use, unprotected]
      - name: status
        type: string
        enum: [active, proposed, degraded, restored]

  - label: Species
    pole_type: OBJECT
    subtype: BIOLOGICAL_SPECIES
    color: "#d97706"
    icon: bug
    properties:
      - name: species_id
        type: string
        required: true
        unique: true
      - name: common_name
        type: string
        required: true
      - name: scientific_name
        type: string
        required: true
      - name: conservation_status
        type: string
        enum: [least_concern, near_threatened, vulnerable, endangered, critically_endangered, extinct_in_wild, extinct]
      - name: population_estimate
        type: integer
      - name: taxonomy_class
        type: string
        enum: [mammalia, aves, reptilia, amphibia, actinopterygii, insecta, plantae]

  - label: Program
    pole_type: OBJECT
    subtype: CONSERVATION_PROGRAM
    color: "#2563eb"
    icon: clipboard-list
    properties:
      - name: program_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: program_type
        type: string
        enum: [habitat_restoration, species_recovery, anti_poaching, community_engagement, research, education]
      - name: start_date
        type: date
      - name: end_date
        type: date
      - name: status
        type: string
        enum: [planning, active, completed, suspended]

  - label: Funding
    pole_type: EVENT
    subtype: FINANCIAL_GRANT
    color: "#0891b2"
    icon: banknote
    properties:
      - name: funding_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: amount
        type: float
        required: true
      - name: currency
        type: string
        default: USD
      - name: funding_type
        type: string
        enum: [grant, donation, government, corporate, endowment]
      - name: award_date
        type: date
      - name: expiry_date
        type: date

  - label: Stakeholder
    pole_type: OBJECT
    subtype: STAKEHOLDER_ENTITY
    color: "#7c3aed"
    icon: users
    properties:
      - name: stakeholder_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: stakeholder_type
        type: string
        enum: [ngo, government, community, academic, corporate, indigenous_group]
      - name: role
        type: string
      - name: country
        type: string

  - label: Monitoring
    pole_type: EVENT
    subtype: MONITORING_EVENT
    color: "#e11d48"
    icon: activity
    properties:
      - name: monitoring_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: monitoring_type
        type: string
        enum: [population_survey, habitat_assessment, water_quality, camera_trap, acoustic, satellite]
      - name: date
        type: datetime
        required: true
      - name: findings
        type: string
      - name: data_quality
        type: string
        enum: [high, medium, low]

relationships:
  - type: PROTECTED_IN
    source: Species
    target: Site
  - type: FUNDED_BY
    source: Program
    target: Funding
  - type: PARTNERED_WITH
    source: Stakeholder
    target: Program
  - type: MONITORS
    source: Monitoring
    target: Species
  - type: THREATENS
    source: Person
    target: Species
  - type: BENEFITS
    source: Program
    target: Species
  - type: LOCATED_AT
    source: Monitoring
    target: Site
  - type: MANAGED_BY
    source: Site
    target: Stakeholder

document_templates:
  - id: conservation_plan
    name: Conservation Plan
    description: Strategic conservation plan for a site or species
    count: 8
    prompt_template: |
      Write a conservation plan for {{species.common_name}} ({{species.scientific_name}})
      at {{site.name}} managed by {{stakeholder.name}}.
      Conservation status: {{species.conservation_status}}.
      Include goals, strategies, timelines, and success metrics.
    required_entities: [Species, Site, Stakeholder, Program]

  - id: monitoring_report
    name: Monitoring Report
    description: Field monitoring report with survey results and observations
    count: 10
    prompt_template: |
      Write a monitoring report for {{monitoring.monitoring_type}} survey at
      {{site.name}} on {{monitoring.date}}. Species of focus: {{species.common_name}}.
      Include methodology, findings, data quality assessment, and recommendations.
    required_entities: [Monitoring, Site, Species]

  - id: donor_update
    name: Donor Update
    description: Progress update for funding organizations
    count: 8
    prompt_template: |
      Write a donor update for {{funding.name}} (${{funding.amount}})
      supporting {{program.name}} at {{site.name}}.
      Include progress highlights, challenges, financial summary, and next steps.
    required_entities: [Funding, Program, Site, Stakeholder]

  - id: stakeholder_communication
    name: Stakeholder Communication
    description: Communication to stakeholders about program activities
    count: 6
    prompt_template: |
      Write a stakeholder communication from {{program.name}} to {{stakeholder.name}}
      regarding conservation activities at {{site.name}}.
      Include program updates, partnership opportunities, and action items.
    required_entities: [Stakeholder, Program, Site]

  - id: impact_assessment
    name: Impact Assessment
    description: Assessment of conservation program impact
    count: 6
    prompt_template: |
      Write an impact assessment for {{program.name}} targeting
      {{species.common_name}} at {{site.name}}.
      Funded by: {{funding.name}}. Include measurable outcomes,
      population trends, habitat changes, and lessons learned.
    required_entities: [Program, Species, Site, Funding]

decision_traces:
  - id: species_intervention
    task: "Evaluate whether to escalate conservation intervention for {{species.common_name}} at {{site.name}}"
    steps:
      - thought: "Review current population trends and monitoring data"
        action: "Query recent monitoring events and population estimates for the species"
      - thought: "Assess threat levels and habitat condition"
        action: "Examine threat factors and site protection status"
      - thought: "Evaluate available resources and program capacity"
        action: "Check current funding, active programs, and stakeholder partnerships"
      - thought: "Consider potential impact and cost-effectiveness"
        action: "Compare intervention options against projected outcomes"
    outcome_template: "Decision: {{decision}} intervention based on {{rationale}}"

  - id: funding_allocation
    task: "Determine allocation of {{funding.name}} across conservation programs"
    steps:
      - thought: "Assess urgency of each program's conservation needs"
        action: "Rank programs by species threat level and habitat degradation"
      - thought: "Evaluate program effectiveness and track record"
        action: "Review monitoring outcomes and past program performance"
      - thought: "Consider stakeholder commitments and matching funds"
        action: "Check partner contributions and co-funding agreements"
    outcome_template: "Allocation plan: {{plan}} with expected outcomes {{outcomes}}"

  - id: site_protection
    task: "Assess whether to expand protection level for {{site.name}}"
    steps:
      - thought: "Analyze biodiversity value and species richness"
        action: "Query all species protected at the site and their conservation status"
      - thought: "Evaluate current threats and encroachment patterns"
        action: "Review monitoring data for habitat loss indicators"
      - thought: "Assess political feasibility and community support"
        action: "Check stakeholder positions and community engagement history"
    outcome_template: "Recommendation: {{recommendation}} with justification {{justification}}"

  - id: species_reintroduction
    task: "Evaluate feasibility of reintroducing {{species.common_name}} to {{site.name}}"
    steps:
      - thought: "Assess habitat suitability and carrying capacity at the target site"
        action: "Query site area, protection level, and existing species for competition analysis"
      - thought: "Review historical presence and reasons for local extinction"
        action: "Check monitoring records and threat data for the species at this site"
      - thought: "Evaluate source population availability and genetic viability"
        action: "Query population_estimate and conservation_status across all sites where species exists"
      - thought: "Assess stakeholder support and community readiness"
        action: "Review stakeholder partnerships and community engagement programs at the site"
    outcome_template: "Reintroduction feasibility: {{feasibility}}. Recommended source: {{source_site}}. Timeline: {{timeline}}"

  - id: habitat_assessment
    task: "Assess habitat condition and restoration needs at {{site.name}}"
    steps:
      - thought: "Review recent monitoring data for habitat quality indicators"
        action: "Query monitoring events of type habitat_assessment and satellite at the site"
      - thought: "Evaluate species diversity as a habitat health proxy"
        action: "Count species protected at the site grouped by conservation_status"
      - thought: "Identify degradation factors and encroachment patterns"
        action: "Check site status and review threat-related monitoring findings"
      - thought: "Estimate restoration costs and prioritize interventions"
        action: "Cross-reference with active habitat_restoration programs and available funding"
    outcome_template: "Habitat grade: {{grade}}. Priority restoration: {{area}} hectares. Estimated cost: ${{cost}}"

  - id: threat_response
    task: "Develop response plan for emerging threat to {{species.common_name}} at {{site.name}}"
    steps:
      - thought: "Characterize the nature and severity of the threat"
        action: "Query THREATENS relationships and recent monitoring findings for the species"
      - thought: "Assess current protection measures and their effectiveness"
        action: "Review active anti_poaching and species_recovery programs at the site"
      - thought: "Identify available resources for rapid response"
        action: "Check funding with remaining budget and stakeholder capacity for emergency action"
      - thought: "Coordinate with partner organizations"
        action: "Query stakeholders partnered with programs at this site for rapid deployment"
    outcome_template: "Threat level: {{level}}. Response plan: {{plan}}. Resources mobilized: {{resources}}"

  - id: community_engagement
    task: "Design community engagement strategy for conservation at {{site.name}} with {{stakeholder.name}}"
    steps:
      - thought: "Map existing community relationships and engagement history"
        action: "Query stakeholders of type community and indigenous_group partnered with site programs"
      - thought: "Identify community benefits and livelihood dependencies on the site"
        action: "Review program types and outcomes that directly benefit local communities"
      - thought: "Design participatory monitoring and stewardship roles"
        action: "Match community capabilities to monitoring needs at the site"
    outcome_template: "Engagement plan: {{plan}}. Community partners: {{partners}}. Expected participation: {{participation}}"

  - id: monitoring_protocol
    task: "Design monitoring protocol for {{species.common_name}} across sites in {{site.country}}"
    steps:
      - thought: "Review existing monitoring methods and their data quality"
        action: "Query monitoring events for the species grouped by monitoring_type and data_quality"
      - thought: "Identify gaps in spatial and temporal coverage"
        action: "Map monitoring frequency and site coverage against species range"
      - thought: "Select optimal monitoring techniques for the species taxonomy"
        action: "Match taxonomy_class to appropriate methods: camera_trap, acoustic, or population_survey"
      - thought: "Estimate resource requirements and assign responsibilities"
        action: "Cross-reference with stakeholder capabilities and program budgets"
    outcome_template: "Protocol: {{method}} at {{frequency}} intervals across {{sites}} sites. Annual cost: ${{cost}}"

  - id: corridor_planning
    task: "Plan wildlife corridor connecting {{site.name}} to adjacent protected areas"
    steps:
      - thought: "Identify species that would benefit from improved connectivity"
        action: "Query species protected at the site with large range requirements by taxonomy_class"
      - thought: "Assess land use and barriers between target sites"
        action: "Review site types and protection levels of nearby conservation areas"
      - thought: "Evaluate stakeholder and landowner cooperation potential"
        action: "Query stakeholders of type community and government in the site's country"
      - thought: "Estimate costs and seek aligned funding sources"
        action: "Check available funding for habitat_restoration programs in the region"
    outcome_template: "Corridor: {{length}} km connecting {{sites}}. Species benefited: {{count}}. Estimated cost: ${{cost}}"

  - id: funding_renewal
    task: "Prepare funding renewal case for {{funding.name}} supporting {{program.name}}"
    steps:
      - thought: "Document measurable outcomes achieved during the funding period"
        action: "Query monitoring results for species benefiting from the program since funding award_date"
      - thought: "Calculate cost-effectiveness of the program"
        action: "Compare funding amount to species population changes and habitat area protected"
      - thought: "Identify remaining gaps and future priorities"
        action: "Review program status and unfunded components against conservation targets"
    outcome_template: "Renewal case: {{outcomes}} achieved. Cost per species outcome: ${{cost_per_outcome}}. Requested: ${{amount}}"

demo_scenarios:
  - name: Species Monitoring
    prompts:
      - "Show me all endangered species and the sites where they are protected"
      - "What are the latest monitoring results for the African elephant?"
      - "Which species have declining population trends in the last year?"

  - name: Program Effectiveness
    prompts:
      - "How effective has the habitat restoration program been at Serengeti?"
      - "Compare funding levels across all active conservation programs"
      - "Which programs have the best species recovery outcomes?"

  - name: Stakeholder & Funding
    prompts:
      - "Show me the stakeholder network for the Coral Reef Alliance"
      - "What grants are expiring in the next 6 months?"
      - "Which funders have contributed the most to anti-poaching efforts?"

agent_tools:
  - name: search_site
    description: Search for conservation sites by name, type, or country
    cypher: |
      MATCH (s:Site)
      WHERE toLower(s.name) CONTAINS toLower($query)
         OR toLower(coalesce(s.country, '')) CONTAINS toLower($query)
         OR toLower(coalesce(s.site_type, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (s)<-[:PROTECTED_IN]-(sp:Species)
      RETURN s, collect(DISTINCT sp.common_name) AS species_present
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Site name, country, or type to search for

  - name: species_status
    description: Get conservation status and monitoring data for a species
    cypher: |
      MATCH (sp:Species)
      WHERE toLower(sp.common_name) CONTAINS toLower($query)
         OR toLower(sp.scientific_name) CONTAINS toLower($query)
      OPTIONAL MATCH (sp)<-[:MONITORS]-(m:Monitoring)
      OPTIONAL MATCH (sp)-[:PROTECTED_IN]->(s:Site)
      RETURN sp, collect(DISTINCT s.name) AS sites,
             collect(DISTINCT {date: m.date, type: m.monitoring_type, findings: m.findings}) AS monitoring_data
      LIMIT 10
    parameters:
      - name: query
        type: string
        description: Common name or scientific name of the species

  - name: program_effectiveness
    description: Evaluate the effectiveness of a conservation program
    cypher: |
      MATCH (p:Program)
      WHERE toLower(p.name) CONTAINS toLower($query)
      OPTIONAL MATCH (p)-[:BENEFITS]->(sp:Species)
      OPTIONAL MATCH (p)<-[:FUNDED_BY]-(f:Funding)
      OPTIONAL MATCH (m:Monitoring)-[:MONITORS]->(sp)
      RETURN p, collect(DISTINCT sp.common_name) AS target_species,
             sum(f.amount) AS total_funding,
             collect(DISTINCT {date: m.date, findings: m.findings}) AS monitoring_results
      LIMIT 10
    parameters:
      - name: query
        type: string
        description: Program name to evaluate

  - name: funding_analysis
    description: Analyze funding sources and allocation across programs
    cypher: |
      MATCH (f:Funding)<-[:FUNDED_BY]-(p:Program)
      OPTIONAL MATCH (p)-[:BENEFITS]->(sp:Species)
      OPTIONAL MATCH (p)<-[:PARTNERED_WITH]-(st:Stakeholder)
      RETURN f.name AS funder, f.amount AS amount, f.funding_type AS type,
             p.name AS program, collect(DISTINCT sp.common_name) AS species,
             collect(DISTINCT st.name) AS partners
      ORDER BY f.amount DESC
      LIMIT 20
    parameters: []

  - name: stakeholder_network
    description: Map the stakeholder network for a conservation program or site
    cypher: |
      MATCH (st:Stakeholder)-[:PARTNERED_WITH]->(p:Program)
      WHERE toLower(st.name) CONTAINS toLower($query)
         OR toLower(p.name) CONTAINS toLower($query)
      OPTIONAL MATCH (p)-[:BENEFITS]->(sp:Species)
      OPTIONAL MATCH (p)<-[:FUNDED_BY]-(f:Funding)
      RETURN st, p, collect(DISTINCT sp.common_name) AS species,
             sum(f.amount) AS total_funding
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Stakeholder or program name to explore

  - name: list_species
    description: "List Species records with optional limit"
    cypher: |
      MATCH (n:Species)
      RETURN n
      ORDER BY n.common_name
      LIMIT toInteger($limit)
    parameters:
      - name: limit
        type: string
        description: "Maximum number of results to return (default: 10)"

  - name: get_species_by_id
    description: "Get a specific Species by ID with all connections"
    cypher: |
      MATCH (n:Species {species_id: $id})
      OPTIONAL MATCH (n)-[r]-(related)
      RETURN n, type(r) AS relationship, labels(related) AS related_labels, related.name AS related_name
      LIMIT 50
    parameters:
      - name: id
        type: string
        description: "The species_id to look up"

system_prompt: |
  You are an AI conservation intelligence assistant with access to a comprehensive
  knowledge graph of conservation data. You help conservation scientists, program
  managers, and field researchers analyze sites, species, programs, funding,
  and stakeholder networks.

  Your capabilities include:
  - Searching and analyzing conservation sites and protected areas
  - Tracking species populations, conservation status, and monitoring data
  - Evaluating program effectiveness and funding allocation
  - Mapping stakeholder partnerships and collaboration networks
  - Assessing threats and recommending conservation interventions

  Always provide accurate, data-driven responses. When making recommendations,
  cite the specific data points and reasoning from the knowledge graph.

visualization:
  node_colors:
    Person: "#22c55e"
    Organization: "#3b82f6"
    Site: "#16a34a"
    Species: "#d97706"
    Program: "#2563eb"
    Funding: "#0891b2"
    Stakeholder: "#7c3aed"
    Monitoring: "#e11d48"
  node_sizes:
    Person: 20
    Organization: 25
    Site: 30
    Species: 25
    Program: 25
    Funding: 20
    Stakeholder: 25
    Monitoring: 15
  default_cypher: "MATCH (sp:Species)-[r:PROTECTED_IN]->(s:Site) RETURN sp, r, s LIMIT 100"
