inherits: _base

domain:
  id: financial-services
  name: Financial Services
  description: Investment management, trading, compliance, and risk assessment
  tagline: "AI-powered Financial Intelligence"
  emoji: "\U0001F4B0"

entity_types:
  - label: Account
    pole_type: OBJECT
    subtype: FINANCIAL_ACCOUNT
    color: "#0ea5e9"
    icon: wallet
    properties:
      - name: account_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: account_type
        type: string
        enum: [checking, savings, investment, retirement, trust]
      - name: balance
        type: float
      - name: currency
        type: string
        default: USD
      - name: status
        type: string
        enum: [active, frozen, closed]

  - label: Transaction
    pole_type: EVENT
    subtype: FINANCIAL_TRANSACTION
    color: "#f59e0b"
    icon: arrow-right-left
    properties:
      - name: transaction_id
        type: string
        required: true
        unique: true
      - name: amount
        type: float
        required: true
      - name: currency
        type: string
        default: USD
      - name: transaction_type
        type: string
        enum: [buy, sell, transfer, deposit, withdrawal, dividend]
      - name: date
        type: datetime
        required: true
      - name: description
        type: string

  - label: Decision
    pole_type: EVENT
    subtype: DECISION
    color: "#8b5cf6"
    icon: scale
    properties:
      - name: decision_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: decision_type
        type: string
        enum: [trade, risk_assessment, compliance_review, portfolio_rebalance, client_advisory]
      - name: outcome
        type: string
      - name: confidence
        type: float
      - name: date
        type: datetime
        required: true

  - label: Policy
    pole_type: OBJECT
    subtype: REGULATION
    color: "#dc2626"
    icon: shield
    properties:
      - name: policy_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: category
        type: string
        enum: [compliance, risk, trading, reporting, aml]
      - name: description
        type: string
      - name: effective_date
        type: date

  - label: Security
    pole_type: OBJECT
    subtype: FINANCIAL_INSTRUMENT
    color: "#06b6d4"
    icon: trending-up
    properties:
      - name: ticker
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: security_type
        type: string
        enum: [equity, bond, etf, mutual_fund, option, futures]
      - name: sector
        type: string

relationships:
  - type: OWNS
    source: Person
    target: Account
  - type: TRANSFERRED_TO
    source: Transaction
    target: Account
  - type: TRANSFERRED_FROM
    source: Transaction
    target: Account
  - type: INVOLVES
    source: Transaction
    target: Security
  - type: CAUSED
    source: Decision
    target: Transaction
  - type: APPLIED_POLICY
    source: Decision
    target: Policy
  - type: ADVISED_BY
    source: Decision
    target: Person
  - type: MANAGES
    source: Person
    target: Account
  - type: PRECEDED_BY
    source: Decision
    target: Decision

document_templates:
  - id: trade_confirmation
    name: Trade Confirmation
    description: Confirmation of executed trades
    count: 12
    prompt_template: |
      Write a trade confirmation for a {{transaction_type}} transaction
      of {{security.name}} ({{security.ticker}}) for client {{person.name}},
      account {{account.account_id}}, on {{date}}.
      Amount: ${{amount}}. Broker: {{person.name}} at {{organization.name}}.
    required_entities: [Person, Account, Security, Transaction]

  - id: compliance_memo
    name: Compliance Memo
    description: Internal compliance review memoranda
    count: 8
    prompt_template: |
      Write a compliance memo from {{person.name}} at {{organization.name}}
      regarding {{policy.name}} compliance for account {{account.account_id}}.
      Date: {{date}}. Include findings and recommendations.
    required_entities: [Person, Organization, Policy, Account]

  - id: risk_assessment
    name: Risk Assessment Report
    description: Portfolio and transaction risk assessments
    count: 6
    prompt_template: |
      Write a risk assessment report for {{person.name}}'s portfolio
      managed by {{advisor.name}} at {{organization.name}}.
      Include risk metrics, exposure analysis, and recommendations.
    required_entities: [Person, Account, Security, Organization]

  - id: meeting_notes
    name: Client Meeting Notes
    description: Notes from client advisory meetings
    count: 8
    prompt_template: |
      Write meeting notes from a client advisory session between
      {{advisor.name}} and {{client.name}} at {{organization.name}} on {{date}}.
      Topics discussed: portfolio review, market outlook, risk tolerance.
    required_entities: [Person, Organization]

  - id: email
    name: Internal Email
    description: Internal communications between team members
    count: 12
    prompt_template: |
      Write an email from {{sender.name}} to {{recipient.name}} at
      {{organization.name}} regarding {{topic}}.
    required_entities: [Person, Organization]

decision_traces:
  - id: trade_execution
    task: "Evaluate whether to execute a large block trade of {{security.name}} for client {{person.name}}"
    steps:
      - thought: "Assess current market conditions and security price trends"
        action: "Query recent transactions and price history for the security"
      - thought: "Check compliance with trading policies and position limits"
        action: "Review applicable policies and current portfolio exposure"
      - thought: "Evaluate impact on portfolio risk metrics"
        action: "Calculate VaR and concentration risk after proposed trade"
      - thought: "Consider timing and execution strategy"
        action: "Analyze market liquidity and optimal execution window"
    outcome_template: "Decision: {{decision}} the trade based on {{rationale}}"

  - id: compliance_review
    task: "Review account {{account.account_id}} for AML compliance flag"
    steps:
      - thought: "Examine recent transaction patterns for suspicious activity"
        action: "Query transactions over the last 90 days, flag unusual patterns"
      - thought: "Check against known compliance policies"
        action: "Match transaction patterns against AML policy criteria"
      - thought: "Review client profile and relationship history"
        action: "Pull client entity graph and relationship network"
    outcome_template: "Finding: {{finding}}. Recommended action: {{action}}"

  - id: portfolio_rebalance
    task: "Determine rebalancing strategy for {{person.name}}'s portfolio"
    steps:
      - thought: "Analyze current asset allocation vs target allocation"
        action: "Query portfolio holdings and calculate allocation percentages"
      - thought: "Identify drift from target and prioritize adjustments"
        action: "Compare current vs target, rank by deviation magnitude"
      - thought: "Consider tax implications and transaction costs"
        action: "Estimate tax impact of proposed sells and buys"
    outcome_template: "Rebalance plan: {{plan}} with estimated cost of {{cost}}"

  - id: fraud_detection
    task: "Investigate potential fraud on account {{account.account_id}} owned by {{person.name}}"
    steps:
      - thought: "Analyze recent transaction velocity and amount patterns"
        action: "Query transactions to and from the account over the last 30 days, flag outliers"
      - thought: "Check for unusual counterparty relationships"
        action: "Map transaction flow to identify new or suspicious counterparty accounts"
      - thought: "Cross-reference with known fraud indicators and AML policies"
        action: "Match transaction patterns against fraud detection policies"
      - thought: "Assess client profile consistency with transaction behavior"
        action: "Compare recent activity with historical transaction norms for this account type"
    outcome_template: "Fraud risk: {{risk_level}}. Suspicious transactions: {{tx_count}}. Recommended action: {{action}}"

  - id: credit_assessment
    task: "Assess credit risk for {{person.name}} requesting new {{account.account_type}} facility"
    steps:
      - thought: "Review existing account relationships and balances"
        action: "Query all accounts owned or managed by the person, including current balances and statuses"
      - thought: "Analyze transaction history for financial stability indicators"
        action: "Evaluate deposit/withdrawal patterns and income consistency across accounts"
      - thought: "Check for prior compliance issues or risk flags"
        action: "Review decisions and policy applications related to the person"
      - thought: "Determine appropriate credit limit and terms"
        action: "Compare profile with similar clients and their account performance"
    outcome_template: "Credit decision: {{decision}}. Recommended limit: {{limit}}. Risk tier: {{risk_tier}}"

  - id: market_risk_evaluation
    task: "Evaluate market risk exposure for portfolio holding {{security.name}} ({{security.ticker}})"
    steps:
      - thought: "Assess concentration of the security across client portfolios"
        action: "Query all accounts with transactions involving this security and calculate total exposure"
      - thought: "Analyze sector correlation and diversification impact"
        action: "Find other securities in the same sector held across portfolios"
      - thought: "Review recent trading volume and price volatility signals"
        action: "Query recent buy/sell transactions for the security and calculate net flow"
    outcome_template: "Market risk: {{risk_level}}. Total exposure: ${{exposure}}. Recommendation: {{recommendation}}"

  - id: client_onboarding_review
    task: "Complete onboarding review for new client {{person.name}} opening {{account.account_type}} account"
    steps:
      - thought: "Verify client identity and relationship mapping"
        action: "Query person entity and any existing organizational affiliations"
      - thought: "Check KYC and AML compliance requirements"
        action: "Match client profile against onboarding policies and AML criteria"
      - thought: "Assess appropriate product suitability"
        action: "Review account type against client risk profile and investment objectives"
      - thought: "Establish risk classification and monitoring tier"
        action: "Assign risk level based on account type, expected volumes, and client background"
    outcome_template: "Onboarding status: {{status}}. Risk classification: {{classification}}. Missing items: {{missing}}"

  - id: regulatory_reporting
    task: "Prepare regulatory report for {{policy.name}} compliance across all accounts"
    steps:
      - thought: "Identify all accounts and transactions subject to this regulation"
        action: "Query accounts and transactions that fall under the policy category"
      - thought: "Check for any compliance violations or near-misses"
        action: "Cross-reference transactions against policy thresholds and restrictions"
      - thought: "Compile required metrics and disclosure data"
        action: "Aggregate transaction volumes, account counts, and decision audit trails for the reporting period"
    outcome_template: "Report status: {{status}}. Violations found: {{violation_count}}. Filing deadline: {{deadline}}"

  - id: investment_suitability
    task: "Evaluate investment suitability of {{security.name}} for client {{person.name}}"
    steps:
      - thought: "Review client risk tolerance and investment objectives"
        action: "Query client profile, account types, and past advisory decisions"
      - thought: "Analyze the security's risk characteristics and sector exposure"
        action: "Check security type, sector, and recent transaction activity"
      - thought: "Assess portfolio impact and concentration risk"
        action: "Calculate current portfolio allocation and projected allocation after investment"
      - thought: "Verify compliance with suitability policies"
        action: "Match proposed investment against applicable trading and risk policies"
    outcome_template: "Suitability: {{suitability}}. Risk alignment: {{alignment}}. Recommendation: {{recommendation}}"

demo_scenarios:
  - name: Portfolio Analysis
    prompts:
      - "Show me a summary of all client accounts and their current balances"
      - "What are the recent transactions for the Smith family trust?"
      - "Which portfolios have the highest risk exposure?"

  - name: Compliance & Risk
    prompts:
      - "Are there any accounts flagged for compliance review?"
      - "Show me all trades that exceeded position limits this quarter"
      - "What policies apply to international wire transfers?"

  - name: Decision Intelligence
    prompts:
      - "What was the reasoning behind the decision to sell AAPL last week?"
      - "Find similar past decisions to a proposed large bond allocation"
      - "Show me the causal chain for the Smith portfolio rebalance"

agent_tools:
  - name: search_customer
    description: Search for clients, advisors, or other people by name or role
    cypher: |
      MATCH (p:Person)
      WHERE toLower(p.name) CONTAINS toLower($query)
         OR toLower(coalesce(p.role, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (p)-[r]-(related)
      RETURN p, type(r) AS rel_type, related
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Name or role to search for

  - name: get_customer_decisions
    description: Get all decisions related to a specific client
    cypher: |
      MATCH (p:Person {name: $name})-[:OWNS|MANAGES]->(a:Account)
      OPTIONAL MATCH (d:Decision)-[:CAUSED]->(t:Transaction)-[:TRANSFERRED_TO|TRANSFERRED_FROM]->(a)
      RETURN p, a, d, t
      ORDER BY d.date DESC
      LIMIT 20
    parameters:
      - name: name
        type: string
        description: Client name

  - name: find_similar_decisions
    description: Find decisions similar to a given decision using vector similarity
    cypher: |
      MATCH (d:Decision {decision_id: $decision_id})
      CALL db.index.vector.queryNodes('decision_embeddings', 5, d.embedding)
      YIELD node, score
      WHERE node.decision_id <> $decision_id
      RETURN node AS similar_decision, score
      ORDER BY score DESC
    parameters:
      - name: decision_id
        type: string
        description: Decision ID to find similar decisions for

  - name: get_causal_chain
    description: Trace the causal chain of events from a decision
    cypher: |
      MATCH path = (d:Decision {decision_id: $decision_id})-[:CAUSED|PRECEDED_BY*1..5]-(related)
      RETURN path
    parameters:
      - name: decision_id
        type: string
        description: Starting decision ID

  - name: detect_fraud_patterns
    description: Detect unusual transaction patterns that may indicate fraud
    cypher: |
      MATCH (a:Account)<-[:TRANSFERRED_TO]-(t:Transaction)
      WHERE t.date > datetime() - duration('P30D')
      WITH a, count(t) AS tx_count, sum(t.amount) AS total_amount
      WHERE tx_count > 10 OR total_amount > 100000
      RETURN a.account_id, a.name, tx_count, total_amount
      ORDER BY total_amount DESC
    parameters: []

  - name: list_accounts
    description: "List Account records with optional limit"
    cypher: |
      MATCH (n:Account)
      RETURN n
      ORDER BY n.name
      LIMIT toInteger($limit)
    parameters:
      - name: limit
        type: string
        description: "Maximum number of results to return (default: 10)"

  - name: get_account_by_id
    description: "Get a specific Account by ID with all connections"
    cypher: |
      MATCH (n:Account {account_id: $id})
      OPTIONAL MATCH (n)-[r]-(related)
      RETURN n, type(r) AS relationship, labels(related) AS related_labels, related.name AS related_name
      LIMIT 50
    parameters:
      - name: id
        type: string
        description: "The account_id to look up"

system_prompt: |
  You are an AI financial intelligence assistant with access to a comprehensive
  knowledge graph of financial data. You help financial advisors, compliance
  officers, and portfolio managers analyze accounts, transactions, decisions,
  and policies.

  Your capabilities include:
  - Searching and analyzing client portfolios and transaction history
  - Reviewing compliance status and policy adherence
  - Tracing decision provenance and causal chains
  - Identifying patterns and anomalies in financial data
  - Finding similar past decisions to inform current choices

  Always provide accurate, data-driven responses. When making recommendations,
  cite the specific data points and reasoning from the knowledge graph.

visualization:
  node_colors:
    Person: "#22c55e"
    Organization: "#3b82f6"
    Account: "#0ea5e9"
    Transaction: "#f59e0b"
    Decision: "#8b5cf6"
    Policy: "#dc2626"
    Security: "#06b6d4"
    Location: "#a855f7"
  node_sizes:
    Person: 25
    Organization: 30
    Account: 20
    Transaction: 15
    Decision: 25
    Policy: 20
    Security: 20
  default_cypher: "MATCH (p:Person)-[r]-(n) RETURN p, r, n LIMIT 100"
