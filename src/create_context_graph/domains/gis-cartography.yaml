inherits: _base

domain:
  id: gis-cartography
  name: GIS & Cartography
  description: Geographic information systems, spatial analysis, surveying, and map production
  tagline: "AI-powered Geospatial Intelligence"
  emoji: "\U0001F5FA"

entity_types:
  - label: Feature
    pole_type: OBJECT
    subtype: GEOGRAPHIC_FEATURE
    color: "#2563eb"
    icon: map-pin
    properties:
      - name: feature_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: feature_type
        type: string
        enum: [point, line, polygon, multipoint, multipolygon, raster]
      - name: geometry_wkt
        type: string
      - name: category
        type: string
        enum: [natural, infrastructure, administrative, hydrological, elevation, land_use]
      - name: source
        type: string
      - name: accuracy_meters
        type: float

  - label: Layer
    pole_type: OBJECT
    subtype: MAP_LAYER
    color: "#7c3aed"
    icon: layers
    properties:
      - name: layer_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: layer_type
        type: string
        enum: [vector, raster, tile, wms, wfs, geojson]
      - name: crs
        type: string
        default: "EPSG:4326"
      - name: scale
        type: string
      - name: feature_count
        type: integer
      - name: visibility
        type: string
        enum: [visible, hidden, filtered]

  - label: Survey
    pole_type: EVENT
    subtype: FIELD_SURVEY
    color: "#ea580c"
    icon: compass
    properties:
      - name: survey_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: survey_type
        type: string
        enum: [topographic, cadastral, geodetic, bathymetric, photogrammetric, lidar]
      - name: date
        type: datetime
        required: true
      - name: surveyor
        type: string
      - name: accuracy_class
        type: string
        enum: [first_order, second_order, third_order, mapping_grade, navigation]
      - name: instrument
        type: string

  - label: Coordinate
    pole_type: OBJECT
    subtype: SPATIAL_COORDINATE
    color: "#0d9488"
    icon: crosshair
    properties:
      - name: coordinate_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
      - name: latitude
        type: float
        required: true
      - name: longitude
        type: float
        required: true
      - name: elevation
        type: float
      - name: crs
        type: string
        default: "EPSG:4326"
      - name: point_type
        type: string
        enum: [control_point, benchmark, station, waypoint, vertex]

  - label: Boundary
    pole_type: OBJECT
    subtype: ADMINISTRATIVE_BOUNDARY
    color: "#dc2626"
    icon: square
    properties:
      - name: boundary_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: boundary_type
        type: string
        enum: [national, state, county, municipal, parcel, zone, district]
      - name: area_sq_km
        type: float
      - name: perimeter_km
        type: float
      - name: jurisdiction
        type: string
      - name: legal_description
        type: string

  - label: MapProject
    pole_type: OBJECT
    subtype: CARTOGRAPHIC_PROJECT
    color: "#ca8a04"
    icon: file-text
    properties:
      - name: project_id
        type: string
        required: true
        unique: true
      - name: name
        type: string
        required: true
      - name: project_type
        type: string
        enum: [topographic_map, thematic_map, cadastral_map, atlas, web_map, 3d_model]
      - name: scale
        type: string
      - name: projection
        type: string
      - name: status
        type: string
        enum: [planning, data_collection, processing, cartography, review, published]
      - name: output_format
        type: string
        enum: [pdf, geotiff, shapefile, geopackage, web_tile, mbtiles]

relationships:
  - type: CONTAINS
    source: Layer
    target: Feature
  - type: BORDERS
    source: Boundary
    target: Boundary
  - type: SURVEYED_BY
    source: Feature
    target: Survey
  - type: OVERLAPS
    source: Boundary
    target: Boundary
  - type: PART_OF_LAYER
    source: Feature
    target: Layer
  - type: REFERENCED_IN
    source: Coordinate
    target: Survey
  - type: INCLUDES_LAYER
    source: MapProject
    target: Layer
  - type: DEFINES
    source: Coordinate
    target: Boundary

document_templates:
  - id: survey_report
    name: Survey Report
    description: Field survey report with methodology and results
    count: 8
    prompt_template: |
      Write a survey report for {{survey.name}} ({{survey.survey_type}})
      conducted on {{survey.date}} by {{survey.surveyor}}.
      Accuracy class: {{survey.accuracy_class}}. Instrument: {{survey.instrument}}.
      Include methodology, control network, observations, and accuracy analysis.
    required_entities: [Survey, Coordinate, Feature]

  - id: boundary_description
    name: Boundary Description
    description: Legal boundary description with metes and bounds
    count: 6
    prompt_template: |
      Write a legal boundary description for {{boundary.name}}
      ({{boundary.boundary_type}}). Area: {{boundary.area_sq_km}} sq km.
      Jurisdiction: {{boundary.jurisdiction}}.
      Include metes and bounds, reference coordinates, and adjoining boundaries.
    required_entities: [Boundary, Coordinate, Survey]

  - id: field_notes
    name: Field Notes
    description: Surveyor's field notes and observations
    count: 10
    prompt_template: |
      Write field notes for the {{survey.survey_type}} survey at {{feature.name}}.
      Date: {{survey.date}}. Surveyor: {{survey.surveyor}}.
      Include weather conditions, equipment setup, observations, and anomalies.
    required_entities: [Survey, Feature, Coordinate]

  - id: map_project_spec
    name: Map Project Specification
    description: Specifications for a cartographic production project
    count: 6
    prompt_template: |
      Write a project specification for {{map_project.name}}
      ({{map_project.project_type}}). Scale: {{map_project.scale}}.
      Projection: {{map_project.projection}}. Format: {{map_project.output_format}}.
      Include data sources, layer specifications, symbolization, and production schedule.
    required_entities: [MapProject, Layer, Feature]

  - id: spatial_analysis
    name: Spatial Analysis Report
    description: Report on spatial analysis findings and methodology
    count: 6
    prompt_template: |
      Write a spatial analysis report examining {{feature.name}} within
      {{boundary.name}}. Layer: {{layer.name}}.
      Include analysis methodology, spatial relationships, statistical results,
      and map outputs.
    required_entities: [Feature, Boundary, Layer, MapProject]

decision_traces:
  - id: data_source_selection
    task: "Select the best data source for mapping {{boundary.name}}"
    steps:
      - thought: "Assess available survey data and its accuracy"
        action: "Query surveys covering the area and their accuracy classes"
      - thought: "Evaluate existing layer data coverage and currency"
        action: "Check which layers contain features within the boundary"
      - thought: "Consider project requirements for scale and accuracy"
        action: "Match data source accuracy against project specification needs"
      - thought: "Determine if supplemental field work is needed"
        action: "Identify coverage gaps and accuracy shortfalls"
    outcome_template: "Data source: {{source}} with {{accuracy}} accuracy. Field work {{needed_or_not}}"

  - id: projection_selection
    task: "Determine the optimal map projection for {{map_project.name}}"
    steps:
      - thought: "Analyze the geographic extent of the project area"
        action: "Query boundary extents and coordinate ranges"
      - thought: "Consider the purpose of the map and required properties"
        action: "Evaluate conformal vs equal-area vs equidistant needs"
      - thought: "Check standard projections for the jurisdiction"
        action: "Look up standard CRS for the project's geographic area"
    outcome_template: "Recommended projection: {{projection}} because {{rationale}}"

  - id: boundary_dispute
    task: "Investigate boundary discrepancy between {{boundary_a}} and {{boundary_b}}"
    steps:
      - thought: "Compare survey records for both boundaries"
        action: "Query surveys and coordinates defining each boundary"
      - thought: "Identify the specific area of overlap or gap"
        action: "Analyze spatial relationships between boundary geometries"
      - thought: "Review legal descriptions and historical records"
        action: "Compare legal descriptions with survey coordinates"
    outcome_template: "Finding: {{finding}}. Discrepancy of {{area}} sq km. Recommendation: {{recommendation}}"

  - id: accuracy_assessment
    task: "Perform accuracy assessment for layer {{layer.name}} against survey {{survey.name}} control points"
    steps:
      - thought: "Identify control points from the reference survey"
        action: "Query coordinates referenced in the survey with known accuracy class"
      - thought: "Compare layer feature positions against control point coordinates"
        action: "Calculate positional offsets between layer features and control points"
      - thought: "Compute statistical accuracy metrics"
        action: "Calculate RMSE, circular error probable, and compliance with accuracy standards"
      - thought: "Determine if the layer meets project accuracy requirements"
        action: "Compare computed accuracy against map project specification thresholds"
    outcome_template: "Accuracy: RMSE {{rmse}}m. Standard met: {{met}}. Recommendation: {{recommendation}}"

  - id: coordinate_transformation
    task: "Determine the best coordinate transformation approach for converting {{layer.name}} from {{source_crs}} to {{target_crs}}"
    steps:
      - thought: "Assess the geographic extent of the data and transformation requirements"
        action: "Query layer extents and coordinate ranges to determine transformation complexity"
      - thought: "Identify available transformation parameters and datum shifts"
        action: "Look up published transformation parameters for the CRS pair"
      - thought: "Evaluate accuracy impact of different transformation methods"
        action: "Compare Helmert, Molodensky, and grid-based methods for this area"
    outcome_template: "Method: {{method}}. Expected accuracy: {{accuracy}}m. Parameters: {{params}}"

  - id: layer_conflation
    task: "Resolve conflicts when merging features from {{layer.name}} with existing data"
    steps:
      - thought: "Identify overlapping features between the layers"
        action: "Perform spatial join to find features within positional tolerance"
      - thought: "Compare attribute accuracy and data currency of conflicting features"
        action: "Check survey dates and accuracy metadata for both data sources"
      - thought: "Determine merge rules for geometry and attributes"
        action: "Define precedence rules based on accuracy class and survey date"
      - thought: "Validate the merged output for topological integrity"
        action: "Check for gaps, overlaps, and dangling edges in the result"
    outcome_template: "Conflation result: {{count}} features merged. Conflicts resolved: {{resolved}}. Manual review: {{manual}}"

  - id: survey_planning
    task: "Plan field survey for map project {{map_project.name}} covering boundary {{boundary.name}}"
    steps:
      - thought: "Determine survey requirements based on project specifications"
        action: "Review map project scale, accuracy needs, and output format"
      - thought: "Assess existing control network coverage"
        action: "Query control points and benchmarks within and near the boundary"
      - thought: "Select appropriate survey methodology and equipment"
        action: "Match survey type and instrument to accuracy class requirements"
      - thought: "Estimate field time and resource requirements"
        action: "Calculate coverage area, point density needs, and crew requirements"
    outcome_template: "Survey plan: {{method}} with {{points}} control points. Duration: {{days}} days. Cost: ${{cost}}"

  - id: cartographic_generalization
    task: "Determine generalization approach for features in {{layer.name}} at scale {{map_project.scale}}"
    steps:
      - thought: "Assess feature density relative to output scale"
        action: "Query feature count and calculate density per map sheet area"
      - thought: "Identify features that require simplification, aggregation, or elimination"
        action: "Classify features by minimum display size at target scale"
      - thought: "Apply appropriate generalization operators"
        action: "Select simplification tolerance, aggregation thresholds, and displacement rules"
    outcome_template: "Generalization: {{approach}}. Features retained: {{retained}}%. Visual quality: {{quality}}"

  - id: quality_control_review
    task: "Perform quality control review of map project {{map_project.name}} before publication"
    steps:
      - thought: "Verify all layers meet positional accuracy requirements"
        action: "Check each layer's accuracy assessment results against project specifications"
      - thought: "Review cartographic symbolization and labeling"
        action: "Validate symbology consistency, label placement, and legend completeness"
      - thought: "Check topological relationships and edge matching"
        action: "Verify boundary continuity, feature connectivity, and sheet-to-sheet matching"
      - thought: "Validate metadata and coordinate reference system documentation"
        action: "Confirm CRS declarations, projection parameters, and data source attribution"
    outcome_template: "QC result: {{result}}. Issues: {{issues}}. Publication ready: {{ready}}"

demo_scenarios:
  - name: Survey & Mapping
    prompts:
      - "Show me all surveys conducted in the Cedar Creek watershed"
      - "What control points were established in the latest geodetic survey?"
      - "Which map projects are currently in production?"

  - name: Boundary Analysis
    prompts:
      - "Are there any overlapping boundaries in the county parcel data?"
      - "Show me all parcels that border the national forest boundary"
      - "What is the total area of the protected zone boundaries?"

  - name: Spatial Intelligence
    prompts:
      - "Which layers contain features within the downtown district?"
      - "Show me the accuracy comparison across different survey types"
      - "What features were captured in the most recent LiDAR survey?"

agent_tools:
  - name: search_feature
    description: Search for geographic features by name, type, or category
    cypher: |
      MATCH (f:Feature)
      WHERE toLower(f.name) CONTAINS toLower($query)
         OR toLower(coalesce(f.category, '')) CONTAINS toLower($query)
         OR toLower(coalesce(f.feature_type, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (f)-[:PART_OF_LAYER]->(l:Layer)
      RETURN f, l.name AS layer_name
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Feature name, type, or category to search for

  - name: layer_contents
    description: Get all features and metadata for a map layer
    cypher: |
      MATCH (l:Layer)
      WHERE toLower(l.name) CONTAINS toLower($query)
      OPTIONAL MATCH (l)<-[:PART_OF_LAYER]-(f:Feature)
      OPTIONAL MATCH (mp:MapProject)-[:INCLUDES_LAYER]->(l)
      RETURN l, collect(DISTINCT {name: f.name, type: f.feature_type, category: f.category}) AS features,
             collect(DISTINCT mp.name) AS projects
      LIMIT 10
    parameters:
      - name: query
        type: string
        description: Layer name to look up

  - name: boundary_analysis
    description: Analyze boundaries and their spatial relationships
    cypher: |
      MATCH (b:Boundary)
      WHERE toLower(b.name) CONTAINS toLower($query)
         OR toLower(coalesce(b.boundary_type, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (b)-[:BORDERS|OVERLAPS]-(adj:Boundary)
      OPTIONAL MATCH (c:Coordinate)-[:DEFINES]->(b)
      RETURN b, collect(DISTINCT {name: adj.name, type: adj.boundary_type}) AS adjacent,
             count(DISTINCT c) AS control_points
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Boundary name or type to analyze

  - name: survey_data
    description: Search for survey records and their associated data
    cypher: |
      MATCH (s:Survey)
      WHERE toLower(s.name) CONTAINS toLower($query)
         OR toLower(coalesce(s.surveyor, '')) CONTAINS toLower($query)
         OR toLower(coalesce(s.survey_type, '')) CONTAINS toLower($query)
      OPTIONAL MATCH (f:Feature)-[:SURVEYED_BY]->(s)
      OPTIONAL MATCH (c:Coordinate)-[:REFERENCED_IN]->(s)
      RETURN s, collect(DISTINCT f.name) AS features_surveyed,
             collect(DISTINCT {name: c.name, lat: c.latitude, lon: c.longitude}) AS coordinates
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Survey name, surveyor, or type to search for

  - name: spatial_query
    description: Find features and layers within or near a boundary
    cypher: |
      MATCH (b:Boundary)
      WHERE toLower(b.name) CONTAINS toLower($query)
      OPTIONAL MATCH (b)<-[:DEFINES]-(c:Coordinate)
      OPTIONAL MATCH (f:Feature)-[:PART_OF_LAYER]->(l:Layer)
      WHERE f.category IS NOT NULL
      RETURN b.name AS boundary, b.area_sq_km AS area,
             collect(DISTINCT {feature: f.name, layer: l.name, category: f.category}) AS features_within
      LIMIT 20
    parameters:
      - name: query
        type: string
        description: Boundary name to query features within

  - name: list_features
    description: "List geographic feature records with optional limit"
    cypher: |
      MATCH (n:Feature)
      RETURN n
      ORDER BY n.name
      LIMIT toInteger($limit)
    parameters:
      - name: limit
        type: string
        description: "Maximum number of results to return (default: 10)"

  - name: get_feature_by_id
    description: "Get a specific geographic feature by ID with all connections"
    cypher: |
      MATCH (n:Feature {feature_id: $id})
      OPTIONAL MATCH (n)-[r]-(related)
      RETURN n, type(r) AS relationship, labels(related) AS related_labels, related.name AS related_name
      LIMIT 50
    parameters:
      - name: id
        type: string
        description: "The feature_id to look up"

system_prompt: |
  You are an AI geospatial intelligence assistant with access to a comprehensive
  knowledge graph of GIS and cartographic data. You help surveyors, cartographers,
  GIS analysts, and land managers work with geographic features, boundaries,
  surveys, and map projects.

  Your capabilities include:
  - Searching and analyzing geographic features across layers
  - Examining boundary relationships including adjacency and overlap
  - Reviewing survey records, control networks, and accuracy data
  - Managing map project specifications and production status
  - Performing spatial queries and relationship analysis

  Always provide accurate, data-driven responses. When discussing spatial
  relationships, reference specific coordinates, accuracies, and data sources.

visualization:
  node_colors:
    Person: "#22c55e"
    Organization: "#3b82f6"
    Feature: "#2563eb"
    Layer: "#7c3aed"
    Survey: "#ea580c"
    Coordinate: "#0d9488"
    Boundary: "#dc2626"
    MapProject: "#ca8a04"
  node_sizes:
    Person: 20
    Organization: 25
    Feature: 15
    Layer: 25
    Survey: 20
    Coordinate: 10
    Boundary: 30
    MapProject: 30
  default_cypher: "MATCH (f:Feature)-[r:PART_OF_LAYER]->(l:Layer) RETURN f, r, l LIMIT 100"
